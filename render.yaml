databases:
  - name: customer-risk-scoring-db
    databaseName: customer_risk_scoring
    user: customer_risk_scoring
    plan: free

services:
  - type: web
    name: customer-risk-scoring-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: python -m pip install -r requirements.txt
    startCommand: PYTHONPATH=. alembic upgrade head && PYTHONPATH=. uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: customer-risk-scoring-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: AUTH_SECRET_KEY
        generateValue: true
      - key: AUTH_TOKEN_TTL_MINUTES
        value: "10080"
      - key: LOGISTIC_MODEL_PATH
        value: app/data/logistic_baseline.json
      - key: SEED_DEMO_PASSWORD
        value: Demo123!

  - type: web
    name: customer-risk-scoring-web
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start -- --hostname 0.0.0.0 --port $PORT
    healthCheckPath: /login
